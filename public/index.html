<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesa do Mestre</title>
  <script>
    (function () {
      var saved = localStorage.getItem('brpg-theme');
      var theme = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <script src="icons.js"></script>
  <aside class="sidebar">
    <div class="brand">
      <svg class="icon brand-icon"><use href="#i-dice-six"/></svg>
      <div>
        <h1 id="campaign-name">Mesa do Mestre</h1>
        <small id="campaign-system">D&D 5e</small>
      </div>
    </div>
    <nav>
      <div class="nav-divider">SESSÃO</div>
      <button class="nav-btn active" data-tab="scenes"><svg class="icon"><use href="#i-mask-happy"/></svg>Cenas</button>
      <button class="nav-btn" data-tab="sessions"><svg class="icon"><use href="#i-calendar"/></svg>Sessões</button>
      <button class="nav-btn" data-tab="ai"><svg class="icon"><use href="#i-sparkle"/></svg>Assistente IA</button>
      <div class="nav-divider">COMBATE</div>
      <button class="nav-btn" data-tab="map"><svg class="icon"><use href="#i-sword"/></svg>Batalha</button>
      <button class="nav-btn" data-tab="bestiario"><svg class="icon"><use href="#i-book-open-text"/></svg>Bestiário</button>
      <div class="nav-divider">CAMPANHA</div>
      <button class="nav-btn" data-tab="story"><svg class="icon"><use href="#i-scroll"/></svg>História</button>
      <button class="nav-btn" data-tab="characters"><svg class="icon"><use href="#i-users"/></svg>Personagens</button>
      <button class="nav-btn" data-tab="items"><svg class="icon"><use href="#i-backpack"/></svg>Itens</button>
      <button class="nav-btn" data-tab="audio"><svg class="icon"><use href="#i-music-notes"/></svg>Áudio</button>
      <button class="nav-btn" data-tab="booth"><svg class="icon"><use href="#i-microphone"/></svg>Cabine</button>
      <button class="nav-btn" data-tab="settings"><svg class="icon"><use href="#i-gear"/></svg>Config</button>
    </nav>
    <button class="theme-toggle" id="theme-toggle" type="button"></button>
    <div class="bot-status" id="bot-status">
      <span class="dot off"></span> Bot desconectado
    </div>
  </aside>

  <main class="content">
    <!-- Barra de controle de som, sempre visível -->
    <div class="sound-bar">
      <div class="sound-now" id="now-playing"><svg class="icon"><use href="#i-speaker-slash"/></svg>Nenhum som tocando</div>
      <div class="sound-controls">
        <select id="voice-channel-select" title="Canal de voz"></select>
        <button id="btn-join" class="btn small"><svg class="icon"><use href="#i-microphone"/></svg>Conectar voz</button>
        <button id="btn-leave" class="btn small ghost">Sair</button>
        <button id="btn-stop-sound" class="btn small danger"><svg class="icon"><use href="#i-stop"/></svg>Parar som</button>
        <label class="volume"><svg class="icon"><use href="#i-speaker-high"/></svg><input type="range" id="volume" min="0" max="1" step="0.05" /></label>
        <span class="dice-quick">
          <input id="dice-expr" placeholder="1d20+5" size="7" />
          <button id="btn-roll" class="btn small" title="Rolar dado"><svg class="icon"><use href="#i-dice-six"/></svg></button>
          <span id="dice-result"></span>
        </span>
      </div>
    </div>

    <section id="tab-scenes" class="tab active"></section>
    <section id="tab-story" class="tab"></section>
    <section id="tab-characters" class="tab"></section>
    <section id="tab-items" class="tab"></section>
    <section id="tab-audio" class="tab"></section>
    <section id="tab-booth" class="tab"></section>
    <section id="tab-map" class="tab"></section>
    <section id="tab-bestiario" class="tab"></section>
    <section id="tab-sessions" class="tab"></section>
    <section id="tab-ai" class="tab"></section>
    <section id="tab-settings" class="tab"></section>
  </main>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal" id="modal"></div>
  </div>
  <div id="toast" class="toast hidden"></div>

  <script src="theme.js"></script>
  <script src="booth.js"></script>
  <script src="battlemap.js"></script>
  <script src="app.js"></script>
</body>
</html>
